{% extends 'base.html' %}

{% block content %}
    <div style="max-width: 420px; margin: 4rem auto;">

        <div class="eve-card">
            <h5>// Login</h5>

            <form method="POST" style="display: flex; flex-direction: column; gap: 1.25rem;">
                {% csrf_token %}

                <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                    <label for="{{ form.username.id_for_label }}">Username</label>
                    {{ form.username }}
                </div>

                <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                    <label for="{{ form.password.id_for_label }}">Password</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="eve-btn" style="width: 100%; justify-content: center;">
                    <i class="fas fa-sign-in-alt"></i> Authenticate
                </button>

            </form>
        </div>

    </div>
{% endblock %}
